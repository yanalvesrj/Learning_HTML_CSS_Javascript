<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tabelas</title>
</head>
<body>
    <!-- Como construir tabelas -->
    <h1>Tabelas</h1> 
    <!-- As linhas da tabela possuem borda que você pode colocar parâmetro, tipo números-->
        <table border="1" width ="400">

            <tr> <!-- Table Row ou linha da tabela-->       
                <td>aa</td><!--Table Data ou dados da tabela ou células da tabela-->
                <td>bb</td>
                <td>cc</td>
                <td>dd</td>
                <!-- OBS: Dá pra salvar imagens na tabela! -->
                <td><img src="imagens/busy.jpg" width="95" /></td>
            
            </tr>
            <tr>
                <th>Código</th><!-- Table Head -->
            <td>ee</td>
            </tr>
            

        </table>
</html>
